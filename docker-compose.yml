services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marsa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marsa}
      POSTGRES_DB: marsa
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marsa -d marsa"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://marsa:${POSTGRES_PASSWORD:-marsa}@db:5432/marsa
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET to a 32+ char secret in .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10/minute}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-120/minute}
      DATA_DIR: /app/data
    volumes:
      - sim_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  db_data:
  sim_data:
